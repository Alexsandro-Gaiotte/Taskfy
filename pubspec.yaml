name: task_app
description: "A simple task management application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  provider: ^6.1.2
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  table_calendar: ^3.1.2
  crypto: ^3.0.7
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
